# Server配置
server:
  port: 2000

# Spring配置
spring:
  profiles:
    active: test
  main:
    allow-circular-references: true
  messages:
    basename: i18n/messages          # 国际化资源文件

# 日志配置
logging:
  level:
    com.example.yugi: debug

# MyBatis配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml  # mapper文件路径
  configuration:
    map-underscore-to-camel-case: true                # 驼峰与下划线转换


